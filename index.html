<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parábolas de Jesus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <button type="button" id="pageTitle" class="topbar-title topbar-title-button">Parábolas de Jesus</button>
      <section class="global-controls" id="globalControls" aria-label="Configuração global de idioma e evangelho">
        <div class="share-picker" id="sharePicker">
          <button type="button" id="share-parable-trigger" class="topbar-icon-btn" aria-label="Compartilhar parábola" title="Compartilhar parábola" aria-haspopup="menu" aria-expanded="false" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M14 3h7v7h-2V6.41l-8.29 8.3-1.42-1.42 8.3-8.29H14V3Zm4 16H6V7h6V5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6h-2v6Z" />
            </svg>
          </button>
          <div id="share-parable-menu" class="share-menu" role="menu" aria-label="Compartilhar parábola">
            <button type="button" class="share-option" data-share-action="system" role="menuitem">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M14 3h7v7h-2V6.41l-8.29 8.3-1.42-1.42 8.3-8.29H14V3Zm4 16H6V7h6V5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6h-2v6Z"/></svg>
              </span>
              <span class="share-label">Compartilhar...</span>
            </button>
            <button type="button" class="share-option" data-share-action="whatsapp" role="menuitem">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M20.52 3.48A11.86 11.86 0 0 0 12.05 0C5.5 0 .16 5.33.16 11.88c0 2.1.55 4.14 1.6 5.94L0 24l6.35-1.66a11.9 11.9 0 0 0 5.7 1.45h.01c6.55 0 11.88-5.34 11.88-11.9 0-3.17-1.23-6.15-3.42-8.4ZM12.06 21.7h-.01a9.83 9.83 0 0 1-5-1.37l-.36-.22-3.77.99 1-3.67-.24-.38a9.82 9.82 0 0 1-1.5-5.17c0-5.45 4.43-9.89 9.89-9.89 2.64 0 5.12 1.03 6.99 2.9a9.8 9.8 0 0 1 2.9 6.98c0 5.46-4.44 9.9-9.9 9.9Zm5.42-7.41c-.3-.15-1.78-.88-2.05-.97-.27-.1-.47-.15-.66.15-.2.3-.76.97-.93 1.16-.17.2-.34.22-.64.08-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.48-1.75-1.65-2.05-.17-.3-.02-.47.13-.62.13-.13.3-.34.44-.5.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.66-1.6-.9-2.2-.24-.58-.49-.5-.66-.5h-.56c-.2 0-.52.08-.8.37-.27.3-1.04 1.02-1.04 2.49s1.06 2.89 1.2 3.1c.15.2 2.08 3.18 5.03 4.46.7.3 1.25.49 1.68.62.7.22 1.33.19 1.83.11.56-.08 1.78-.73 2.03-1.44.25-.71.25-1.33.17-1.45-.07-.11-.27-.18-.57-.33Z"/></svg>
              </span>
              <span class="share-label">WhatsApp</span>
            </button>
            <button type="button" class="share-option" data-share-action="facebook" role="menuitem">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M24 12a12 12 0 1 0-13.88 11.85v-8.39H7.08V12h3.04V9.36c0-3.01 1.8-4.67 4.55-4.67 1.32 0 2.7.24 2.7.24v2.96h-1.52c-1.5 0-1.97.93-1.97 1.89V12h3.35l-.54 3.46h-2.8v8.39A12 12 0 0 0 24 12Z"/></svg>
              </span>
              <span class="share-label">Facebook</span>
            </button>
            <button type="button" class="share-option" data-share-action="instagram" role="menuitem">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm-.2 1.9A3.65 3.65 0 0 0 3.9 7.55v8.9A3.65 3.65 0 0 0 7.55 20.1h8.9a3.65 3.65 0 0 0 3.65-3.65v-8.9a3.65 3.65 0 0 0-3.65-3.65h-8.9ZM17.5 6.4a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.9A3.1 3.1 0 1 0 12 15.1 3.1 3.1 0 0 0 12 8.9Z"/></svg>
              </span>
              <span class="share-label">Instagram</span>
            </button>
            <button type="button" class="share-option" data-share-action="x" role="menuitem">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M18.25 2h3.42l-7.47 8.54L23 22h-6.83l-5.35-7-6.12 7H1.28l7.98-9.12L1 2h7l4.84 6.4L18.25 2Zm-1.2 18h1.9L6.95 3.9h-2L17.05 20Z"/></svg>
              </span>
              <span class="share-label">X</span>
            </button>
            <button type="button" class="share-option" data-share-action="copy" role="menuitem">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"/></svg>
              </span>
              <span class="share-label">Copiar link</span>
            </button>
          </div>
        </div>
        <div class="lang-picker" id="langPicker">
          <button type="button" id="global-language-trigger" class="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span id="global-language-flag" class="lang-flag">🇧🇷</span>
            <span id="global-language-label" class="lang-label">Português</span>
            <span class="lang-chevron" aria-hidden="true">▾</span>
          </button>
          <div id="global-language-menu" class="lang-menu" role="listbox" aria-label="Idioma"></div>
        </div>
      </section>
    </div>
  </div>
  <main class="page" id="topo">
    <header class="page-header" id="pageHeader">
      <h1 id="mobilePageTitle" class="page-header-title">Parábolas de Jesus</h1>
    </header>

    <section class="search-bar" id="searchBarSection">
      <label class="search-label" for="parableSearchInput">
        <span class="visually-hidden" id="parableSearchLabel">Buscar parábolas</span>
      </label>
      <input
        type="search"
        id="parableSearchInput"
        class="search-input"
        autocomplete="off"
        spellcheck="false"
        placeholder="Buscar parábolas"
        aria-labelledby="parableSearchLabel"
      />
    </section>

    <div id="mobile-language-dialog" class="mobile-lang-dialog" aria-hidden="true">
      <div id="mobile-language-backdrop" class="mobile-lang-backdrop"></div>
      <div class="mobile-lang-panel" role="dialog" aria-modal="true" aria-labelledby="mobile-language-dialog-title">
        <h2 id="mobile-language-dialog-title" class="mobile-lang-title">Idioma</h2>
        <button type="button" id="mobile-language-close" class="mobile-lang-close" aria-label="Fechar">×</button>
        <div id="mobile-language-menu" class="mobile-lang-menu" role="listbox" aria-label="Idioma"></div>
      </div>
    </div>

    <nav class="index" id="indexNav" aria-label="Índice das parábolas">
      <ul id="indexList"></ul>
    </nav>

    <section id="parablesContainer" class="parables" aria-label="Parábolas em sequência"></section>
  </main>

  <script src="./all_parables_api_bible.js"></script>
  <script src="./script.js"></script>
</body>
</html>
