<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parábolas de Jesus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page" id="topo">
    <header class="header">
      <h1 id="pageTitle">Parábolas de Jesus</h1>
      <button
        type="button"
        id="mobile-language-trigger"
        class="mobile-lang-trigger"
        aria-haspopup="dialog"
        aria-expanded="false"
        aria-controls="mobile-language-dialog"
      >
        <span id="mobile-language-flag" class="lang-flag">🇧🇷</span>
      </button>
    </header>

    <section class="search-bar" id="searchBarSection">
      <label class="search-label" for="parableSearchInput">
        <span class="visually-hidden" id="parableSearchLabel">Buscar parábolas</span>
      </label>
      <input
        type="search"
        id="parableSearchInput"
        class="search-input"
        autocomplete="off"
        spellcheck="false"
        placeholder="Buscar parábolas"
        aria-labelledby="parableSearchLabel"
      />
    </section>

    <section class="global-controls" id="globalControls" aria-label="Configuração global de idioma e evangelho">
      <div class="lang-picker" id="langPicker">
        <button type="button" id="global-language-trigger" class="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
          <span id="global-language-flag" class="lang-flag">🇧🇷</span>
          <span id="global-language-label" class="lang-label">Português</span>
          <span class="lang-chevron" aria-hidden="true">▾</span>
        </button>
        <div id="global-language-menu" class="lang-menu" role="listbox" aria-label="Idioma"></div>
      </div>
    </section>

    <div id="mobile-language-dialog" class="mobile-lang-dialog" aria-hidden="true">
      <div id="mobile-language-backdrop" class="mobile-lang-backdrop"></div>
      <div class="mobile-lang-panel" role="dialog" aria-modal="true" aria-labelledby="mobile-language-dialog-title">
        <h2 id="mobile-language-dialog-title" class="mobile-lang-title">Idioma</h2>
        <button type="button" id="mobile-language-close" class="mobile-lang-close" aria-label="Fechar">×</button>
        <div id="mobile-language-menu" class="mobile-lang-menu" role="listbox" aria-label="Idioma"></div>
      </div>
    </div>

    <nav class="index" id="indexNav" aria-label="Índice das parábolas">
      <ul id="indexList"></ul>
    </nav>

    <section id="parablesContainer" class="parables" aria-label="Parábolas em sequência"></section>
  </main>

  <script src="./all_parables_api_bible.js"></script>
  <script src="./script.js"></script>
</body>
</html>
